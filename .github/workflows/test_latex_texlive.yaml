# Modified: https://github.com/devcontainers/feature-starter/blob/67a45f05bb47843fef96f53ab09eab04680f6d95/.github/workflows/test.yaml
name: "CI - Test Features - LaTeX (TeX Live)"
on:
  workflow_dispatch:
    inputs:
      year:
        description: "Select year"
        required: true
        type: choice
        options:
          - "2015"
          - "2016"
          - "2017"
          - "2018"
          - "2019"
          - "2020"
          - "2021"
          - "2022"
          - "2023"
          - "2024"
          - "2025"
          - "2026"

jobs:
  test-scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for 'latex-texlive' scenarios"
        run: devcontainer features test --features latex-texlive --filter ${{ github.event.inputs.year }} --skip-autogenerated --skip-duplicated .
