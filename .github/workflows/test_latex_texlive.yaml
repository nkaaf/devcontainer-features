# Modified: https://github.com/devcontainers/feature-starter/blob/67a45f05bb47843fef96f53ab09eab04680f6d95/.github/workflows/test.yaml
name: "CI - Test Features"
on:
  push:
    branches:
      - main
    paths:
      - "src/latex-texlive/**"
      - "test/latex-texlive/**"
  pull_request:
    paths:
      - "src/latex-texlive/**"
      - "test/latex-texlive/**"
  workflow_dispatch:

jobs:
  test-scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for 'latex-texlive' scenarios"
        run: devcontainer features test -f latex-texlive --skip-autogenerated --skip-duplicated .
