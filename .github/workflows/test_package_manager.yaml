# Modified: https://github.com/devcontainers/feature-starter/blob/67a45f05bb47843fef96f53ab09eab04680f6d95/.github/workflows/test.yaml
name: "CI - Test Features - Package Manager"
on:
  workflow_dispatch:
    inputs:
      manager:
        description: "Select manager"
        required: true
        type: choice
        options:
          - "system"
          - "apt"
          - "tlmgr"

jobs:
  test-scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for 'package-manager' scenarios"
        run: |
          manager="${{ inputs.manager }}"
          feature="package-manager${manager != 'system' && echo "-$manager"}"
          devcontainer features test --features "$feature" --skip-autogenerated --skip-duplicated
